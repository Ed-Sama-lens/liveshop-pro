services:
  postgres:
    image: postgres:16-alpine
    container_name: liveshop-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: liveshop
      POSTGRES_PASSWORD: liveshop_dev_2024
      POSTGRES_DB: liveshop_pro
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: liveshop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
